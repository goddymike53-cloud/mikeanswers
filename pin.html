
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Enter Pin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Enter Pin</h2>
    <input type="text" id="pin" placeholder="Enter PIN">
    <button onclick="checkPin()">Continue</button>
  </div>

<script>
function checkPin(){
  const pin = document.getElementById("pin").value;
  if(pin === "1234"){
    window.location.href = "answers.html";
  } else {
    alert("Invalid PIN");
  }
}
</script>
</body>
</html>
