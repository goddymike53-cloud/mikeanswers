<!DOCTYPE html>
<html>
<head>
  <title>Enter PIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, sans-serif;
      background:linear-gradient(135deg,#001f12,#004d2b);
      color:white;
      text-align:center;
      padding-top:100px;
    }

    input{
      width:85%;
      max-width:350px;
      padding:14px;
      border-radius:8px;
      border:none;
      font-size:18px;
      text-align:center;
    }

    button{
      width:85%;
      max-width:350px;
      padding:14px;
      margin-top:15px;
      border:none;
      border-radius:8px;
      background:#00e676;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h2>Enter PIN</h2>

<input type="text" id="pinInput" placeholder="Enter PIN">
<br>
<button onclick="goToAnswers()">Unlock</button>

<script>
function goToAnswers(){
  const pin = document.getElementById("pinInput").value;

  if(pin === ""){
    alert("Enter PIN first");
    return;
  }

  window.location.href = "answers.html?pin=" + pin;
}
</script>

</body>
</html>
