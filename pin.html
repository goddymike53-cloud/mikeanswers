<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Enter PIN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg, #003d1f, #006633);
    color:white;
    text-align:center;
}

.container{
    padding:60px 20px;
}

h2{
    font-size:28px;
    margin-bottom:30px;
}

input{
    width:90%;
    max-width:400px;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    outline:none;
    text-align:center;
}

button{
    margin-top:20px;
    padding:14px 40px;
    font-size:16px;
    background:gold;
    color:black;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#result{
    margin-top:40px;
    padding:25px;
    width:90%;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
    background:rgba(0,0,0,0.4);
    border-radius:12px;
    text-align:left;
    white-space:pre-wrap;
    display:none;
    font-size:16px;
}

.error{
    margin-top:20px;
    color:#ff4d4d;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <h2>Enter Your PIN</h2>

    <input type="text" id="pinInput" placeholder="Enter PIN">

    <br>
    <button onclick="checkPin()">VIEW ANSWER</button>

    <div class="error" id="errorMsg"></div>
</div>

<div id="result"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAzSw3J9ijVn-1xwGkKh8ZXe77i44QsVmE",
  authDomain: "mikeanswers-1ba00.firebaseapp.com",
  projectId: "mikeanswers-1ba00"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function checkPin(){

    const pin = document.getElementById("pinInput").value.trim();
    const errorMsg = document.getElementById("errorMsg");
    const resultDiv = document.getElementById("result");

    errorMsg.innerHTML = "";
    resultDiv.style.display = "none";

    if(pin === ""){
        errorMsg.innerHTML = "Enter PIN first";
        return;
    }

    db.collection("answers").where("pin","==",pin).get()
    .then((querySnapshot)=>{

        if(querySnapshot.empty){
            errorMsg.innerHTML = "❌ Invalid PIN";
        }else{
            querySnapshot.forEach((doc)=>{
                const data = doc.data();
                resultDiv.innerHTML = data.content;
                resultDiv.style.display = "block";
            });
        }

    })
    .catch((error)=>{
        errorMsg.innerHTML = "Error loading answer";
        console.log(error);
    });
}

</script>

</body>
</html>
