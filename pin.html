<!DOCTYPE html>
<html>
<head>
  <title>Enter PIN - MikeAnswers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, sans-serif;
      background: linear-gradient(135deg,#001f12,#004d2b);
      color:white;
      text-align:center;
    }

    .section{
      padding:80px 20px;
    }

    h1{
      font-size:30px;
      margin-bottom:15px;
    }

    .badge{
      display:inline-block;
      padding:8px 20px;
      border-radius:25px;
      background: linear-gradient(145deg,#FFD700,#FFB700,#FFC300);
      color:#111;
      font-weight:bold;
      box-shadow:0 0 15px rgba(255,215,0,0.8);
      margin-bottom:30px;
    }

    input{
      width:85%;
      max-width:350px;
      padding:14px;
      border-radius:8px;
      border:none;
      font-size:18px;
      text-align:center;
      margin-bottom:20px;
    }

    button{
      width:85%;
      max-width:350px;
      padding:14px;
      border:none;
      border-radius:8px;
      background:#ffc107;
      font-weight:bold;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    .note{
      margin-top:30px;
      font-size:16px;
      opacity:0.8;
    }
  </style>
</head>

<body>

<div class="section">
  <h1>Enter PIN to View Answer</h1>

  <div class="badge">✔ VERIFIED PREMIUM ACCESS</div>

  <input type="text" id="pinInput" placeholder="Enter PIN">

  <br>

  <button onclick="goToAnswers()">Unlock Answer</button>

  <div class="note">
    Answer coming<br>
    Stay tuned for more...
  </div>
</div>

<script>
  function goToAnswers(){
    const pin = document.getElementById("pinInput").value;

    if(pin === ""){
      alert("Enter PIN first");
      return;
    }

    window.location.href = "answers.html?pin=" + pin;
  }
</script>

</body>
</html>
