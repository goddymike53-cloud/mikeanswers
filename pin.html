<!DOCTYPE html>
<html>
<head>
  <title>Enter PIN - MikeAnswers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, sans-serif;
      background: linear-gradient(135deg,#001f12,#004d2b);
      color:white;
      text-align:center;
      padding:80px 20px;
    }

    input{
      width:85%;
      max-width:350px;
      padding:14px;
      border-radius:8px;
      border:none;
      font-size:18px;
      text-align:center;
      margin-bottom:20px;
    }

    button{
      width:85%;
      max-width:350px;
      padding:14px;
      border:none;
      border-radius:8px;
      background:#ffc107;
      font-weight:bold;
      font-size:18px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h1>Enter PIN to View Answer</h1>

<input type="text" id="pinInput" placeholder="Enter PIN">

<br>

<button onclick="goToAnswers()">Unlock Answer</button>

<script>
function goToAnswers(){
  const pin = document.getElementById("pinInput").value;

  if(pin === ""){
    alert("Enter PIN first");
    return;
  }

  // Send PIN to answers page
  window.location.href = "answers.html?pin=" + pin;
}
</script>

</body>
