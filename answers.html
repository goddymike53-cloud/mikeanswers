<!DOCTYPE html>
<html>
<head>
  <title>Answers Page</title>

  <style>
    body{
      margin:0;
      font-family:Segoe UI, sans-serif;
      background: linear-gradient(135deg,#001f12,#004d2b);
      color:#00ff88;
      text-align:center;
      padding-top:100px;
    }

    h2{
      font-size:28px;
      margin-bottom:20px;
      color:#00ff88;
    }

    .answer-box{
      width:90%;
      margin:20px auto;
      padding:25px;
      background: rgba(0,255,100,0.08);
      border:1px solid rgba(0,255,100,0.4);
      border-radius:15px;
      font-size:18px;
      color:#00ff88;
      box-shadow:0 0 20px rgba(0,255,100,0.4);
    }
  </style>

</head>

<body>

<h2>Answers Page</h2>

<div class="answer-box" id="answerBox">
  Loading answers...
</div>

<script>
  const pin = localStorage.getItem("accessPin");

  const answers = {
    "1111": "WAEC Mathematics Answers: 1A, 2B, 3C...",
    "2222": "NECO English Answers: Essay topic is...",
    "3333": "JAMB Biology Answers: 1C, 2A, 3D..."
  };

  if (answers[pin]) {
    document.getElementById("answerBox").innerHTML = answers[pin];
  } else {
    document.getElementById("answerBox").innerHTML = "Invalid or Expired PIN";
  }
</script>

</body>
</html>
