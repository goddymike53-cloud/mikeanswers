<!DOCTYPE html>
<html>
<head>
  <title>Answers</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    img {
      max-width: 100%;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h2 id="title"></h2>
<div id="content"></div>
<img id="image">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzSw3J9ijVn-1xwGkKh8ZXe77i44QsVmE",
  authDomain: "mikeanswers-1ba00.firebaseapp.com",
  projectId: "mikeanswers-1ba00"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Get subject and pin from URL
const urlParams = new URLSearchParams(window.location.search);
const subject = urlParams.get("subject");
const pin = urlParams.get("pin");

document.getElementById("title").innerText = subject;

const docRef = doc(db, "answers", subject);
const docSnap = await getDoc(docRef);

if (docSnap.exists()) {

  const data = docSnap.data();

  if (data.pin === pin) {

    document.getElementById("content").innerHTML = data.content;

    if (data.image) {
      document.getElementById("image").src = data.image;
    }

  } else {
    alert("Wrong PIN");
  }

} else {
  alert("Subject not found");
}

</script>

</body>
</html>
