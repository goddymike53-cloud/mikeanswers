
<!DOCTYPE html>
<html>
<head>
<title>Answers Page</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background: linear-gradient(135deg,#001f12,#004d2b);
  color:#00ff99;
  text-align:center;
  padding-top:100px;
}

.answer-box{
  margin:20px auto;
  width:85%;
  padding:20px;
  border-radius:15px;
  background:rgba(0,255,120,0.08);
  box-shadow:0 0 20px rgba(0,255,120,0.4);
  font-size:18px;
}
</style>
</head>

<body>

<h2>Answers Page</h2>

<div class="answer-box" id="answerBox">
Checking PIN...
</div>

<script>
const savedPin = localStorage.getItem("accessPin");

// 🔐 ADMIN MULTIPLE PINS HERE
const pins = {
  "MATH2026": "📘 WAEC Mathematics Answers:<br><br>1. A<br>2. C<br>3. B<br>4. D",

  "ENG2026": "📗 WAEC English Answers:<br><br>1. B<br>2. D<br>3. A<br>4. C",

  "BIO2026": "🧬 WAEC Biology Answers:<br><br>1. D<br>2. A<br>3. C<br>4. B"
};

if(pins[savedPin]){
   document.getElementById("answerBox").innerHTML = pins[savedPin];
}else{
   document.getElementById("answerBox").innerHTML =
   "❌ Invalid or Expired PIN";
}
</script>

</body>
</html>
