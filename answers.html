
<!DOCTYPE html>
<html>
<head>
<title>Answers Page</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background: linear-gradient(135deg,#001f12,#004d2b);
  color:#00ff99;
  text-align:center;
  padding-top:100px;
}

.answer-box{
  margin:20px auto;
  width:85%;
  padding:20px;
  border-radius:15px;
  background:rgba(0,255,120,0.08);
  box-shadow:0 0 20px rgba(0,255,120,0.4);
  font-size:18px;
}
</style>
</head>

<body>

<h2>Answers Page</h2>

<div class="answer-box" id="answerBox">
Checking PIN...
</div>
<script>

const enteredPin = localStorage.getItem("accessPin");
const subject = "waec2026"; // change for other pages
const savedPin = localStorage.getItem(subject + "_pin");

const answerBox = document.getElementById("answerBox");

if(!enteredPin){
    answerBox.innerHTML = "❌ No PIN Entered";
}
else if(enteredPin !== savedPin){
    answerBox.innerHTML = "❌ Invalid or Expired PIN";
}
else{
    answerBox.innerHTML = "✅ Correct PIN<br><br>YOUR ANSWERS WILL SHOW HERE";
}

</script>

</body>
</html
