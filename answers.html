<!DOCTYPE html>
<html>
<head>
  <title>Answers Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, sans-serif;
      background:linear-gradient(135deg,#001f12,#004d2b);
      color:white;
    }

    .header{
      text-align:center;
      padding:20px;
      font-size:22px;
      font-weight:bold;
      background:#062f1c;
      box-shadow:0 3px 10px rgba(0,0,0,0.4);
    }

    .answers-container{
      padding:20px;
      max-width:1000px;
      margin:auto;
    }

    .answer-box{
      background:#0d3f28;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
      font-size:18px;
      line-height:1.6;
    }

    .loading{
      text-align:center;
      font-size:18px;
      margin-top:40px;
      opacity:0.8;
    }
  </style>
</head>

<body>

<div class="header">
  ✅ VERIFIED PREMIUM ACCESS
</div>

<div class="answers-container" id="content">
  <div class="loading">Checking PIN...</div>
</div>

<script>
  // Get PIN from URL
  const params = new URLSearchParams(window.location.search);
  const pin = params.get("pin");

  const content = document.getElementById("content");

  // 🔒 Admin created PIN
  const adminPin = "8080";   // change this anytime

  if(pin === adminPin){

    // Load answers straight
    content.innerHTML = `
      <div class="answer-box">
        <strong>English:</strong><br>
        1. A<br>
        2. C<br>
        3. B<br>
      </div>

      <div class="answer-box">
        <strong>Mathematics:</strong><br>
        1. D<br>
        2. B<br>
        3. A<br>
      </div>

      <div class="answer-box">
        <strong>Biology:</strong><br>
        1. C<br>
        2. A<br>
        3. D<br>
      </div>
    `;

  } else {
    content.innerHTML = `
      <div class="loading">
        ❌ Invalid PIN <br><br>
        <a href="index.html" style="color:#00e676;">Go Back</a>
      </div>
    `;
  }
</script>

</body>
</html>
