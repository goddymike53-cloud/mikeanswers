<!DOCTYPE html>
<html>
<head>
  <title>Answers Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, sans-serif;
      background:linear-gradient(135deg,#001f12,#004d2b);
      color:white;
    }

    .header{
      text-align:center;
      padding:20px;
      font-size:22px;
      font-weight:bold;
      background:#062f1c;
      box-shadow:0 3px 10px rgba(0,0,0,0.4);
    }

    .answers-container{
      padding:20px;
      max-width:800px;
      margin:auto;
    }

    .answer-box{
      background:#0d3f28;
      padding:25px;
      border-radius:12px;
      margin-bottom:25px;
      box-shadow:0 0 15px rgba(0,0,0,0.5);
    }

    .subject-title{
      font-size:20px;
      font-weight:bold;
      margin-bottom:15px;
      color:#00e676;
    }

    .answer-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      font-size:18px;
    }

    .answer-item{
      background:rgba(255,255,255,0.05);
      padding:10px 15px;
      border-radius:8px;
    }

    .loading{
      text-align:center;
      font-size:18px;
      margin-top:40px;
      opacity:0.8;
    }

    a{
      color:#00e676;
      text-decoration:none;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="header">
  ✅ VERIFIED PREMIUM ACCESS
</div>

<div class="answers-container" id="content">
  <div class="loading">Checking PIN...</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pin = params.get("pin");

  const content = document.getElementById("content");

  const adminPin = "8080"; // Change anytime

  if(pin === adminPin){

    content.innerHTML = `

      <div class="answer-box">
        <div class="subject-title">English</div>
        <div class="answer-list">
          <div class="answer-item">1. A</div>
          <div class="answer-item">2. C</div>
          <div class="answer-item">3. B</div>
        </div>
      </div>

      <div class="answer-box">
        <div class="subject-title">Mathematics</div>
        <div class="answer-list">
          <div class="answer-item">1. D</div>
          <div class="answer-item">2. B</div>
          <div class="answer-item">3. A</div>
        </div>
      </div>

      <div class="answer-box">
        <div class="subject-title">Biology</div>
        <div class="answer-list">
          <div class="answer-item">1. C</div>
          <div class="answer-item">2. A</div>
          <div class="answer-item">3. D</div>
        </div>
      </div>

    `;

  } else {
    content.innerHTML = `
      <div class="loading">
        ❌ Invalid PIN <br><br>
        <a href="index.html">Go Back</a>
      </div>
    `;
  }
</script>

</body>
</html>
