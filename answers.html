
<!DOCTYPE html>
<html>
<head>
<title>Answers Page</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background: linear-gradient(135deg,#001f12,#004d2b);
  color:#00ff99;
  text-align:center;
  padding-top:100px;
}

.answer-box{
  margin:20px auto;
  width:85%;
  padding:20px;
  border-radius:15px;
  background:rgba(0,255,120,0.08);
  box-shadow:0 0 20px rgba(0,255,120,0.4);
  font-size:18px;
}
</style>
</head>

<body>

<h2>Answers Page</h2>

<div class="answer-box" id="answerBox">
Checking PIN...
</div>
<script>

const enteredPin = localStorage.getItem("accessPin");
const subject = "waec2026"; // change for other pages
const savedPin = localStorage.getItem(subject + "_pin");

const answerBox = document.getElementById("answerBox");

if(!enteredPin){
    answerBox.innerHTML = "❌ No PIN Entered";
}
else if(enteredPin !== savedPin){
    answerBox.innerHTML = "❌ Invalid or Expired PIN";
}
else{
    answerBox.innerHTML = "✅ Correct PIN<br><br>YOUR ANSWERS WILL SHOW HERE";
}

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAzSw3J9ijVn-1xwGkKh8ZXe77i44QsVmE",
  authDomain: "mikeanswers-1ba00.firebaseapp.com",
  projectId: "mikeanswers-1ba00",
  storageBucket: "mikeanswers-1ba00.firebasestorage.app",
  messagingSenderId: "999853103064",
  appId: "1:999853103064:web:b74a41daf8205a52d244ad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.goToPin = async function() {

  const enteredPin = document.getElementById("pinInput").value;

  if (!enteredPin) {
    document.getElementById("result").innerHTML = "❌ No PIN Entered";
    return;
  }

  const collections = ["waec2026", "neco2026", "jamb2026"];
  let found = false;

  for (let name of collections) {
    const snapshot = await getDocs(collection(db, name));

    snapshot.forEach(doc => {
      const data = doc.data();

      if (data.pin === enteredPin) {
        document.getElementById("result").innerHTML =
          `<h3>${data.subject}</h3><p>${data.content}</p>`;
        found = true;
      }
    });
  }

  if (!found) {
    document.getElementById("result").innerHTML = "❌ Invalid PIN";
  }

};

</script>

</body>
</html
