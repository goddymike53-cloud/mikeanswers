<!DOCTYPE html>
<html>
<head>
  <title>Answers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, sans-serif;
      background:linear-gradient(135deg,#001f12,#004d2b);
      color:white;
      text-align:center;
      padding-top:60px;
    }

    .box{
      max-width:500px;
      margin:20px auto;
      padding:20px;
      background:#0d3f28;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h2>VERIFIED PREMIUM ACCESS</h2>

<div id="content">
  Checking PIN...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzSw3J9ijVn-1xwGkKh8ZXe77i44QsVmE",
  authDomain: "mikeanswers-1ba00.firebaseapp.com",
  databaseURL: "https://mikeanswers-1ba00-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mikeanswers-1ba00",
  storageBucket: "mikeanswers-1ba00.firebasestorage.app",
  messagingSenderId: "999853103064",
  appId: "1:999853103064:web:b74a41daf8205a52d244ad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const pin = params.get("pin");

const content = document.getElementById("content");

async function checkPin(){

  if(!pin){
    content.innerHTML = "No PIN provided";
    return;
  }

  const docRef = doc(db, "pins", pin);
  const docSnap = await getDoc(docRef);

  if(docSnap.exists() && docSnap.data().active === true){

    content.innerHTML = `
      <div class="box">
        <h3>Access Granted</h3>
        <p>Your answers will appear here.</p>
      </div>
    `;

  } else {

    content.innerHTML = `
      <div class="box">
        Invalid PIN
      </div>
    `;

  }

}

checkPin();

</script>

</body>
</html>
