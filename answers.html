<!DOCTYPE html>
<html>
<head>
  <title>Answers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:Segoe UI, sans-serif;
      background:linear-gradient(135deg,#001f12,#004d2b);
      color:white;
    }

    .header{
      text-align:center;
      padding:20px;
      font-size:22px;
      font-weight:bold;
      background:#062f1c;
    }

    .container{
      padding:20px;
      max-width:800px;
      margin:auto;
    }

    .answer-box{
      background:#0d3f28;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .loading{
      text-align:center;
      margin-top:40px;
    }
  </style>
</head>

<body>

<div class="header">
  VERIFIED PREMIUM ACCESS
</div>

<div class="container" id="content">
  <div class="loading">Checking PIN...</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzSw3J9ijVn-1xwGkKh8ZXe77i44QsVmE",
  authDomain: "mikeanswers-1ba00.firebaseapp.com",
  projectId: "mikeanswers-1ba00",
  storageBucket: "mikeanswers-1ba00.firebasestorage.app",
  messagingSenderId: "999853103064",
  appId: "1:999853103064:web:b74a41daf8205a52d244ad"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const userPin = params.get("pin");

const contentDiv = document.getElementById("content");

if(!userPin){
  contentDiv.innerHTML = "No PIN provided.";
} else {

  const q = query(collection(db, "answers"), where("pin", "==", userPin));
  const querySnapshot = await getDocs(q);

  if(querySnapshot.empty){
    contentDiv.innerHTML = "Invalid PIN.";
  } else {

    contentDiv.innerHTML = "";

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      contentDiv.innerHTML += `
        <div class="answer-box">
          <h3>${data.subject}</h3>
          <p>${data.content.replace(/\n/g, "<br>")}</p>
        </div>
      `;
    });

  }
}

</script>

</body>
</html>
