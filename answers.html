
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Answers</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Latest Answer</h2>
    <div id="answerBox">Loading...</div>
  </div>

<script type="module" src="firebase.js"></script>
<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const docRef = doc(db, "answers", "latest");
const docSnap = await getDoc(docRef);

if (docSnap.exists()) {
  document.getElementById("answerBox").innerText = docSnap.data().content;
} else {
  document.getElementById("answerBox").innerText = "No answer uploaded yet.";
}
</script>
</body>
</html>
