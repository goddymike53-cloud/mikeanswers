<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikeanswers</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(to bottom, #003300, #006633);
    color:white;
    text-align:center;
}

/* ===== TOP PIN BAR ===== */
.top-bar{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:10px;
    background:#022b1f;
}

.top-bar input{
    padding:10px;
    border-radius:6px;
    border:none;
    width:120px;
    text-align:center;
    font-weight:bold;
    background:#0b5d3b;
    color:white;
}

.top-bar button{
    padding:10px 14px;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.chat-btn{
    background:#25D366;
    color:white;
}

.view-btn{
    background:orange;
    color:black;
}

/* ===== MAIN ===== */
.main{
    padding:40px 20px;
}

.main h1{
    font-size:40px;
    margin-bottom:10px;
}

.main p{
    max-width:500px;
    margin:auto;
}

/* ===== BUTTONS ===== */
.home-btn, .pin-btn, .admin-btn{
    margin:10px;
    padding:12px 20px;
    border-radius:8px;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.home-btn{
    background:orange;
    color:black;
}

.pin-btn{
    background:#0b5d3b;
    color:#00ff99;
    border:2px solid #00ff99;
}

.admin-btn{
    background:transparent;
    border:2px solid orange;
    color:orange;
}

/* ===== TELEGRAM ===== */
.telegram-btn{
    display:block;
    width:90%;
    max-width:380px;
    margin:30px auto 10px auto;
    padding:16px;
    background:#229ED9;
    color:white;
    text-align:center;
    border-radius:12px;
    font-weight:bold;
    text-decoration:none;
    box-shadow:0 0 15px rgba(34,158,217,0.8);
    transition:0.3s;
}

.telegram-btn:hover{
    box-shadow:0 0 30px rgba(34,158,217,1);
}

/* ===== VIP WHATSAPP GOLD ===== */
.vip-box{
    background:#1c1c6b;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:400px;
}

.vip-box h3{
    margin:0 0 15px 0;
}

.vip-whatsapp-btn{
    display:block;
    padding:18px;
    background:linear-gradient(45deg, gold, #d4af37);
    color:black;
    text-align:center;
    border-radius:12px;
    font-weight:bold;
    text-decoration:none;
    box-shadow:0 0 20px gold;
    animation:goldGlow 1.5s infinite alternate;
}

@keyframes goldGlow{
    from{ box-shadow:0 0 10px gold; }
    to{ box-shadow:0 0 30px gold, 0 0 40px #ffd700; }
}

.vip-whatsapp-btn:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<!-- ===== TOP PIN BAR ===== -->
<div class="top-bar">

<a href="https://wa.me/2349161508767" target="_blank">
<button class="chat-btn">Chat</button>
</a>

<input type="text" id="topPin" placeholder="PIN">

<button onclick="redirectPin()" class="view-btn">
VIEW ANSWER
</button>

</div>

<!-- ===== MAIN SECTION ===== -->
<div class="main">

<h1>Mikeanswers</h1>

<p>
Your reliable source for correct WAEC, NECO, and JAMB answers – quick, accurate, and free.
</p>

<br>

<button class="home-btn">Home</button>
<button class="pin-btn" onclick="window.location.href='pin.html'">Enter Pin</button>
<br>
<button class="admin-btn" onclick="window.location.href='admin.html'">Admin Login</button>

</div>

<!-- ===== TELEGRAM BUTTON ===== -->
<a href="https://t.me/+PZCB6fpd08VjMWQ0" target="_blank" class="telegram-btn">
Join Our Telegram Channel
</a>

<!-- ===== VIP WHATSAPP GOLD ===== -->
<div class="vip-box">
<h3>Want early VIP answers before the exam?</h3>

<a href="https://wa.me/2349161508767?text=Hello%20I%20want%20VIP%20answers"
   target="_blank"
   class="vip-whatsapp-btn">
Message 2349161508767 on WhatsApp
</a>

</div>

<script>
function redirectPin(){
    var pin = document.getElementById("topPin").value;

    if(pin === ""){
        alert("Enter PIN first");
        return;
    }

    window.location.href = "pin.html?pin=" + pin;
}
</script>

</body>
</html>
