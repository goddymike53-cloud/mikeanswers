<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
body { font-family: Arial; background:#061a12; color:white; padding:20px; }
.card { background:#0d2a1f; padding:20px; border-radius:10px; max-width:400px; margin:auto; }
input, textarea, select { width:100%; padding:10px; margin:8px 0; border-radius:6px; border:none; }
button { width:100%; padding:12px; background:#1fa34a; color:white; border:none; border-radius:6px; font-weight:bold; }
.hidden { display:none; }
</style>
</head>
<body>

<div id="loginView" class="card">
<h2>Admin Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="dashboardView" class="hidden">
<h2>Admin Dashboard</h2>
<button onclick="logout()">Logout</button>
<div class="card">
<h3>Upload Answers</h3>
<input type="text" id="pin" placeholder="PIN Code">
<input type="text" id="subject" placeholder="Subject">
<select id="exam">
<option>WAEC</option>
<option>NECO</option>
<option>JAMB</option>
</select>
<textarea id="answers" rows="6" placeholder="Enter questions and answers"></textarea>
<button onclick="saveEntry()">Upload Answers</button>
</div>
<div class="card">
<h3>Uploaded Entries</h3>
<div id="entries"></div>
</div>
</div>

<script>
const ADMIN_EMAIL = "michaelgodknows293@gmail.com";
const ADMIN_PASSWORD = "Goddy1234";

function login() {
const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value;

if(email === ADMIN_EMAIL && password === ADMIN_PASSWORD){
localStorage.setItem("adminLoggedIn","true");
showDashboard();
} else {
alert("Invalid login credentials");
}
}

function logout(){
localStorage.removeItem("adminLoggedIn");
location.reload();
}

function showDashboard(){
document.getElementById("loginView").classList.add("hidden");
document.getElementById("dashboardView").classList.remove("hidden");
loadEntries();
}

function saveEntry(){
const pin = document.getElementById("pin").value;
const subject = document.getElementById("subject").value;
const exam = document.getElementById("exam").value;
const answers = document.getElementById("answers").value;

if(!pin || !subject || !answers){
alert("Fill all fields");
return;
}

const entries = JSON.parse(localStorage.getItem("entries") || "[]");
entries.push({pin, subject, exam, answers});
localStorage.setItem("entries", JSON.stringify(entries));
alert("Saved successfully");
loadEntries();
}

function loadEntries(){
const entries = JSON.parse(localStorage.getItem("entries") || "[]");
const container = document.getElementById("entries");
container.innerHTML = "";

entries.forEach((e)=>{
container.innerHTML += `<div style="margin-bottom:10px; background:#133c2c; padding:10px; border-radius:6px;">
<strong>${e.subject}</strong> (${e.exam})<br>
PIN: ${e.pin}<br>
<pre>${e.answers}</pre>
</div>`;
});
}

if(localStorage.getItem("adminLoggedIn")){
showDashboard();
}
</script>

</body>
</html>
