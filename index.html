<!DOCTYPE html>
<html>
<head>
  <title>Enter PIN</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    input, select, button {
      padding: 10px;
      margin: 10px;
      width: 250px;
    }

    button {
      background: green;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<h2>Enter Your PIN</h2>

<select id="subject">
  <option value="Accounting">Accounting</option>
  <option value="Agriculture">Agriculture</option>
  <option value="Biology">Biology</option>
  <option value="CRS">CRS</option>
  <option value="Chemistry">Chemistry</option>
  <option value="Commerce">Commerce</option>
  <option value="Economics">Economics</option>
  <option value="English">English</option>
  <option value="Further maths">Further maths</option>
  <option value="Geography">Geography</option>
  <option value="Government">Government</option>
  <option value="Lit in English">Lit in English</option>
  <option value="Marketing">Marketing</option>
  <option value="Physics">Physics</option>
  <option value="Civic education">Civic education</option>
  <option value="mathematics">mathematics</option>
</select>

<br>

<input type="text" id="pin" placeholder="Enter PIN">

<br>

<button onclick="goToAnswers()">Submit</button>

<script>
function goToAnswers() {
  const subject = document.getElementById("subject").value;
  const pin = document.getElementById("pin").value;

  if(pin === "") {
    alert("Enter PIN");
    return;
  }

  window.location.href = 
    "answers.html?subject=" + encodeURIComponent(subject) +
    "&pin=" + encodeURIComponent(pin);
}
</script>

</body>
</html>>
