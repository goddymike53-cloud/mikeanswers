<!DOCTYPE html>
<html>
<head>
<title>Mikeanswers</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#001f12,#004d2b);
    color:white;
    text-align:center;
}

/* ===== TOP PIN BANNER ===== */
.top-pin-banner{
    width:100%;
    background:#063d1e;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:12px;
    position:fixed;
    top:0;
    left:0;
    z-index:9999;
}

.top-pin-banner input{
    padding:10px;
    width:90px;
    border:none;
    border-radius:6px;
    text-align:center;
    font-weight:bold;
}

.chat-btn{
    background:#25D366;
    color:white;
    padding:10px 16px;
    border-radius:6px;
    text-decoration:none;
    font-weight:bold;
}

.view-btn{
    background:#f4a100;
    color:black;
    padding:10px 16px;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

/* ===== MAIN CONTENT ===== */
.main{
    padding-top:120px;
}

button{
    padding:14px 25px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.home-btn{
    background:#f4a100;
}

.pin-btn{
    background:transparent;
    border:2px solid #00e676;
    color:#00e676;
}

.admin-btn{
    background:transparent;
    border:2px solid #f4a100;
    color:#f4a100;
}

.telegram-btn{
    display:block;
    margin:20px auto;
    width:90%;
    max-width:400px;
    text-align:center;
    background:#229ED9;
    color:white;
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    text-decoration:none;
}

.whatsapp-big{
    display:block;
    margin:20px auto;
    width:90%;
    max-width:400px;
    text-align:center;
    background:#25D366;
    color:white;
    padding:15px;
    border-radius:12px;
    font-weight:bold;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- ===== TOP PIN BAR ===== -->
<div class="top-pin-banner">
    <a href="https://wa.me/2349161508767" target="_blank" class="chat-btn">
        Chat
    </a>

    <input type="text" id="topPin" placeholder="PIN">

    <button onclick="redirectToPinPage()" class="view-btn">
        VIEW ANSWER
    </button>
</div>

<!-- ===== MAIN SECTION ===== -->
<div class="main">
    <h1>Mikeanswers</h1>

    <p>
        Your reliable source for correct WAEC, NECO, and JAMB answers – quick, accurate, and free.
    </p>

    <button class="home-btn">Home</button>
    <button class="pin-btn" onclick="window.location.href='pin.html'">Enter Pin</button>
    <br>
    <button class="admin-btn" onclick="window.location.href='admin.html'">Admin Login</button>

    <a href="https://wa.me/2349161508767" target="_blank" class="whatsapp-big">
        Join Our WhatsApp Channel
    </a>

    <!-- 🔴 CHANGE USERNAME BELOW -->
    <a href="<a href="https://t.me/+PZCB6fpd08VjMWQ0" target="_blank" class="btn btn-telegram">
  Join Our Telegram Channel
  </a>" target="_blank" class="telegram-btn">
        Join Our Telegram Channel
    </a>
</div>

<script>
function redirectToPinPage(){
    const pin = document.getElementById("topPin").value;

    if(pin === ""){
        alert("Enter PIN first");
        return;
    }

    window.location.href = "pin.html?pin=" + pin;
}
</script>

</body>
</html>
