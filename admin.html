
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <div id="uploadSection" style="display:none;">
      <h3>Upload Answer</h3>
      <textarea id="answerText" placeholder="Type answer here..."></textarea>
      <button onclick="uploadAnswer()">Save Answer</button>
    </div>
  </div>

<script type="module" src="firebase.js"></script>
<script type="module">
import { auth, db } from "./firebase.js";
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

window.login = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  await signInWithEmailAndPassword(auth, email, password);
  document.getElementById("uploadSection").style.display = "block";
}

window.uploadAnswer = async function() {
  const text = document.getElementById("answerText").value;
  await setDoc(doc(db, "answers", "latest"), { content: text });
  alert("Answer saved!");
}
</script>
</body>
</html>
